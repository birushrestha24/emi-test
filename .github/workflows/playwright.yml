name: EMI Calculator – Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * *'        # Nightly at 02:00 UTC
  workflow_dispatch:
    inputs:
      project:
        description: 'Browser project to run (chromium | firefox | webkit | all)'
        required: false
        default: 'chromium'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── 1. Type-check ──────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: tsc --noEmit
        run: npx tsc --noEmit

  # ── 2. Smoke tests (fast gate) ─────────────────────────────────────────────
  smoke:
    name: Smoke – Chromium
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        run: npx playwright test --project=chromium --grep @smoke

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report
          path: playwright-report/
          retention-days: 14

  # ── 3. Full regression matrix ──────────────────────────────────────────────
  regression:
    name: Regression – ${{ matrix.project }}
    needs: smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.project }}

      - name: Run regression tests
        env:
          CI: true
        run: npx playwright test --project=${{ matrix.project }} --grep @regression

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-report-${{ matrix.project }}
          path: playwright-report/
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: failures-${{ matrix.project }}
          path: test-results/
          retention-days: 14

  # ── 4. Summary ────────────────────────────────────────────────────────────
  summary:
    name: Test Summary
    needs: regression
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v4
        with:
          pattern: regression-report-*
          path: all-reports/

      - name: Print summary
        run: |
          echo "## Playwright Test Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Browser | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          for browser in chromium firefox webkit; do
            if [ -d "all-reports/regression-report-$browser" ]; then
              echo "| $browser | ✅ Report available |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $browser | ❌ No report |" >> $GITHUB_STEP_SUMMARY
            fi
          done
